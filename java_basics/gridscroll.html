<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scrollable Grid</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f9f9f9;
      }

      .scroll-container {
        position: relative;
        overflow: hidden;
        max-width: 100%;
      }

      .grid-wrapper {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        grid-auto-flow: column;
        gap: 20px;
        overflow-x: auto;
        scroll-behavior: smooth;
        padding: 20px;
      }

      .grid-item {
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .grid-item:hover {
        transform: scale(1.05);
      }

      .scroll-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: #333;
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
        z-index: 1;
        border-radius: 50%;
      }

      .scroll-left {
        left: 0;
      }

      .scroll-right {
        right: 0;
      }

      @media (max-width: 600px) {
        .grid-wrapper {
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="scroll-container">
      <button class="scroll-btn scroll-left" onclick="scrollGrid(-1)">
        &#8592;
      </button>
      <div class="grid-wrapper" id="gridWrapper">
        <div class="grid-item" onclick="itemClicked(1)">Item 1</div>
        <div class="grid-item" onclick="itemClicked(2)">Item 2</div>
        <div class="grid-item" onclick="itemClicked(3)">Item 3</div>
        <div class="grid-item" onclick="itemClicked(4)">Item 4</div>
        <div class="grid-item" onclick="itemClicked(5)">Item 5</div>
        <div class="grid-item" onclick="itemClicked(6)">Item 6</div>
        <div class="grid-item" onclick="itemClicked(7)">Item 7</div>
        <div class="grid-item" onclick="itemClicked(8)">Item 8</div>
        <!-- Add more items as needed -->
      </div>
      <button class="scroll-btn scroll-right" onclick="scrollGrid(1)">
        &#8594;
      </button>
    </div>

    <script>
      function scrollGrid(direction) {
        const wrapper = document.getElementById("gridWrapper");
        const scrollAmount = wrapper.offsetWidth;
        wrapper.scrollBy({
          left: direction * scrollAmount,
          behavior: "smooth",
        });
      }

      function itemClicked(id) {
        alert(`Item ${id} clicked!`);
        // You can trigger navigation or modal here
      }
    </script>
  </body>
</html>
