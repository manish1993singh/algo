<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scrollable Card Holder</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f4f4f4;
      }

      .container {
        position: relative;
        width: 100%;
        max-width: 1200px;
        margin: auto;
        overflow: hidden;
      }

      .card-wrapper {
        display: flex;
        overflow-x: auto;
        scroll-behavior: smooth;
        padding: 10px;
      }

      .card {
        flex: 0 0 25%;
        margin: 10px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        transition: transform 0.2s ease;
        text-align: center;
        padding: 20px;
      }

      .card:hover {
        transform: scale(1.05);
      }

      .scroll-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: #333;
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
        z-index: 1;
        border-radius: 50%;
      }

      .scroll-left {
        left: -20px;
      }

      .scroll-right {
        right: -20px;
      }

      @media (max-width: 768px) {
        .card {
          flex: 0 0 50%;
        }
      }

      @media (max-width: 480px) {
        .card {
          flex: 0 0 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <button class="scroll-btn scroll-left" onclick="scrollCards(-1)">
        &#8592;
      </button>
      <div class="card-wrapper" id="cardWrapper">
        <div class="card" onclick="cardClicked(1)">Card 1</div>
        <div class="card" onclick="cardClicked(2)">Card 2</div>
        <div class="card" onclick="cardClicked(3)">Card 3</div>
        <div class="card" onclick="cardClicked(4)">Card 4</div>
        <div class="card" onclick="cardClicked(5)">Card 5</div>
        <div class="card" onclick="cardClicked(6)">Card 6</div>
        <div class="card" onclick="cardClicked(7)">Card 7</div>
        <div class="card" onclick="cardClicked(8)">Card 8</div>
      </div>
      <button class="scroll-btn scroll-right" onclick="scrollCards(1)">
        &#8594;
      </button>
    </div>

    <script>
      function scrollCards(direction) {
        const wrapper = document.getElementById("cardWrapper");
        const cardWidth = wrapper.querySelector(".card").offsetWidth + 20;
        wrapper.scrollBy({
          left: direction * cardWidth * 4,
          behavior: "smooth",
        });
      }

      function cardClicked(id) {
        alert(`Card ${id} clicked!`);
      }
    </script>
  </body>
</html>
